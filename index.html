<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles/style.css" />
        <script src="./scripts/oGameData.js"></script>
        <script type="module" src="./scripts/script.js"></script>
        <title>Gotta catch 'em all</title>
    </head>
    <body>
        <!-- Detta är koden från mitt exempel, skriv gärna egen HTML om så önskas -->
        <section class="form-wrapper" id="formWrapper">
            <form class="form" id="form">
                <h1 class="form__heading">Welcome young pokemon trainer</h1>
                <h3 class="form__sub-heading">
                    Please enter your name and age:
                </h3>
                <!-- Error Message -->
                <p class="form__error-msg" id="errorMsg"></p>
                <input
                    class="form__input-field"
                    id="nick"
                    type="text"
                    placeholder="Trainer nickname" />
                <input
                    class="form__input-field"
                    id="age"
                    type="text"
                    placeholder="Age" />
                <p class="form__text">Are you a boy? Or are you a girl?</p>
                <label>
                    <input
                        class="form__radio-btn"
                        type="radio"
                        name="gender"
                        id="boy" />
                    Boy
                </label>
                <label>
                    <input
                        class="form__radio-btn"
                        type="radio"
                        name="gender"
                        id="girl" />
                    Girl
                </label>
                <button class="form__btn" id="submitBtn">
                    Let's catch some pokemons!
                </button>
            </form>
        </section>
        <section id="gameField" class="game-field d-none">
            <section class="high-score d-none" id="highScore">
                <h1 class="game-field__heading">Congratulations!</h1>
                <h3 class="gamefield__sub-heading" id="winMsg"></h3>
                <ol class="highscore-list" id="highscoreList"></ol>
                <button class="game-field__btn" id="playAgainBtn">
                    Play again?
                </button>
            </section>
        </section>

        <!-- Läs in audioelementet från DOMen. För att spela .play(), för att pausa .pause(), för att starta om .load()  -->
        <audio src="./assets/pokemon_vs_trainer.mp3" id="bgMusic"></audio>
    </body>
</html>
